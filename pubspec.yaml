name: dorkcoin_wallet

description: A minimal Flutter light wallet for Dorkcoin.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  qr_flutter: ^4.1.0
  crypto: ^3.0.3
  bs58: ^1.0.2
  convert: ^3.1.1
  pointycastle: ^3.9.1
  cupertino_icons: ^1.0.8
  local_auth: ^2.3.0
  mobile_scanner: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  